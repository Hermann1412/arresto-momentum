<svg width="680" height="540" viewBox="0 0 680 540" xmlns="http://www.w3.org/2000/svg">
<title>Arresto Mementum logo</title>
<desc>A warm, festive logo featuring a cocktail glass with bubbles inside a circular badge, with a universal tagline about capturing moments.</desc>

<defs>
<linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#FF6B6B"/>
<stop offset="50%" stop-color="#FFB84D"/>
<stop offset="100%" stop-color="#FFD93D"/>
</linearGradient>
<linearGradient id="drinkGrad" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#FF6B6B"/>
<stop offset="100%" stop-color="#C2185B"/>
</linearGradient>
<linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#FFD93D" stop-opacity="0.3"/>
<stop offset="100%" stop-color="#FFB84D" stop-opacity="0.6"/>
</linearGradient>
</defs>

<!-- Outer badge circle -->
<circle cx="340" cy="200" r="160" fill="#2D1B3D"/>
<circle cx="340" cy="200" r="160" fill="none" stroke="url(#warmGrad)" stroke-width="3"/>
<circle cx="340" cy="200" r="148" fill="none" stroke="#FFD93D" stroke-width="0.8" opacity="0.5" stroke-dasharray="2 6"/>

<!-- Top arc decorations: stars -->
<g fill="#FFD93D">
<circle cx="220" cy="120" r="2"/>
<circle cx="340" cy="80" r="2.5"/>
<circle cx="460" cy="120" r="2"/>
<circle cx="180" cy="200" r="1.5"/>
<circle cx="500" cy="200" r="1.5"/>
</g>

<!-- Confetti dots scattered -->
<g opacity="0.7">
<rect x="240" y="100" width="4" height="4" fill="#FF6B6B" transform="rotate(20 242 102)"/>
<rect x="430" y="105" width="4" height="4" fill="#4ECDC4" transform="rotate(-15 432 107)"/>
<rect x="260" y="295" width="4" height="4" fill="#FFD93D" transform="rotate(45 262 297)"/>
<rect x="415" y="295" width="4" height="4" fill="#FF6B6B" transform="rotate(-30 417 297)"/>
<circle cx="200" cy="260" r="2" fill="#4ECDC4"/>
<circle cx="480" cy="260" r="2" fill="#FFB84D"/>
<circle cx="210" cy="160" r="2" fill="#FF6B6B"/>
<circle cx="470" cy="160" r="2" fill="#FFD93D"/>
</g>

<!-- Cocktail glass centerpiece -->
<g transform="translate(340 200)">

<!-- Glass triangle -->
<path d="M -55 -50 L 55 -50 L 0 30 Z" fill="url(#glassGrad)" stroke="#FFD93D" stroke-width="2.5" stroke-linejoin="round"/>

<!-- Liquid inside -->
<path d="M -42 -38 L 42 -38 L 0 22 Z" fill="url(#drinkGrad)" opacity="0.95"/>

<!-- Liquid surface -->
<ellipse cx="0" cy="-38" rx="42" ry="4" fill="#FF6B6B" opacity="0.8"/>

<!-- Olive on stick -->
<line x1="20" y1="-65" x2="8" y2="-30" stroke="#FFD93D" stroke-width="1.5" stroke-linecap="round"/>
<circle cx="20" cy="-65" r="5" fill="#4ECDC4"/>
<circle cx="20" cy="-65" r="2" fill="#C2185B"/>

<!-- Glass stem -->
<line x1="0" y1="30" x2="0" y2="65" stroke="#FFD93D" stroke-width="3" stroke-linecap="round"/>

<!-- Glass base -->
<ellipse cx="0" cy="68" rx="28" ry="4" fill="none" stroke="#FFD93D" stroke-width="2.5"/>
<line x1="-28" y1="68" x2="28" y2="68" stroke="#FFD93D" stroke-width="2.5"/>

<!-- Bubbles rising -->
<circle cx="-15" cy="-25" r="2" fill="#FFD93D" opacity="0.9"/>
<circle cx="10" cy="-15" r="1.5" fill="#FFD93D" opacity="0.7"/>
<circle cx="-5" cy="-45" r="1.8" fill="#FFD93D" opacity="0.8"/>
<circle cx="18" cy="-30" r="1.2" fill="#FFD93D" opacity="0.6"/>

<!-- Sparkle on glass -->
<line x1="-35" y1="-40" x2="-30" y2="-20" stroke="#ffffff" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>

<!-- Sparkles above glass -->
<g stroke="#FFD93D" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.8">
<path d="M -25 -75 L -22 -82"/>
<path d="M 0 -85 L 0 -95"/>
<path d="M 28 -75 L 32 -82"/>
</g>

<!-- Star sparkles -->
<g fill="#FFD93D">
<path d="M -40 -80 L -38 -76 L -34 -78 L -38 -76 L -40 -72 L -42 -76 L -46 -78 L -42 -76 Z"/>
<path d="M 45 -85 L 47 -81 L 51 -83 L 47 -81 L 45 -77 L 43 -81 L 39 -83 L 43 -81 Z"/>
</g>

</g>

<!-- Wordmark -->
<text x="340" y="410" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="500" fill="#C2185B" letter-spacing="3" font-style="italic">Arresto</text>
<text x="340" y="455" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="46" font-weight="500" fill="#FF6B6B" letter-spacing="3" font-style="italic">Mementum</text>

<!-- Decorative divider with dots -->
<g transform="translate(340 478)">
<line x1="-110" y1="0" x2="-15" y2="0" stroke="#FFB84D" stroke-width="1"/>
<line x1="15" y1="0" x2="110" y2="0" stroke="#FFB84D" stroke-width="1"/>
<circle cx="0" cy="0" r="3" fill="#FFD93D"/>
<circle cx="-12" cy="0" r="1.5" fill="#FF6B6B"/>
<circle cx="12" cy="0" r="1.5" fill="#FF6B6B"/>
</g>

<!-- Universal tagline -->
<text x="340" y="505" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="14" font-weight="400" fill="#FFB84D" letter-spacing="3" font-style="italic">&#8220; where every moment becomes a memory &#8221;</text>

</svg>
